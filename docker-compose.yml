services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drone_backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env.docker
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
        NEXT_PUBLIC_BACKEND_DOC_URL: http://localhost:3001/api
        NEXT_PUBLIC_RENDER_NEW_PRODUCT_QUANTITY: 2
        BACKEND_URL: http://backend:3001
        BACKEND_DOC_URL: http://backend:3001/api
    container_name: drone_frontend
    ports:
      - "3000:3000"
    env_file:
      - frontend/.env.docker
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      - backend

  redis:
    image: redis:latest
    container_name: drone_redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16
    container_name: drone_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: drone_shop
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d drone_shop" ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  redis-data:
  postgres-data: